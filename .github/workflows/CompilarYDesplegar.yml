name: Compilar y desplegar

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Instalar .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x
          
      - name: Obteniendoi dependencias
        run: dotnet restore

      - name: Compilar
        run: dotnet build --no-restore
